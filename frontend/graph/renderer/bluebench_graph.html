<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Bench Graph</title>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="./d3.v7.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #eef3fb;
      color: #10243e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000000;
      overflow: hidden;
    }

    .frame {
      height: 100vh;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      background-color: #1a1026;
    }

    .link {
      stroke: #2a2a33;
      stroke-width: 2;
    }

    .node {
      cursor: grab;
    }

    .node circle {
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 3;
    }

    .node text {
      font-size: 12px;
      font-weight: 600;
      fill: #e7ebf5;
      pointer-events: none;
    }

    .node--expanded circle {
      stroke-width: 5;
      filter: drop-shadow(0 0 10px rgba(16, 36, 62, 0.35));
    }

    .node--selected circle {
      stroke: #b56cff;
      stroke-width: 6;
      filter: drop-shadow(0 0 12px rgba(181, 108, 255, 0.48));
    }

    .marker-badge {
      stroke: #0b0b0e;
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="canvas">
      <svg id="graph"></svg>
    </div>
  </div>

  <script>
    const svg = d3.select("#graph");
    const canvas = document.querySelector(".canvas");
    const expandedNodes = new Set();
    const expandedClusters = new Set();
    let layoutMode = "vertical";
    let currentTransform = d3.zoomIdentity;
    let selectedNodeId = null;
    let focusNodeId = null;
    const focusRadius = 1;
    const focusFadeMode = true;
    let currentGraphData = { nodes: [], edges: [] };
    let zoomBehavior = null;

    function getMarkerColor(markerType) {
      if (markerType === "performance") {
        return "#ff5f5f";
      }

      if (markerType === "optimization") {
        return "#ffd166";
      }

      if (markerType === "refactor") {
        return "#5dade2";
      }

      if (markerType === "investigate") {
        return "#9b5de5";
      }

      return "#d8d8df";
    }

    function getNodeColor(node) {
      if (node.color) {
        return node.color;
      }

      if (node.type === "subsystem") {
        return "#1f2a44";
      }

      if (node.type === "module") {
        return "#4a1f2d";
      }

      if (node.type === "function") {
        return "#cfcfcf";
      }

      if (node.type === "class") {
        return "#7f5af0";
      }

      if (node.type === "cluster") {
        return "#3c2a5e";
      }

      return "#cfcfcf";
    }

    function enrichNodes(nodes) {
      return nodes.map((node, index) => ({
        ...node,
        label: node.label || node.name || node.id,
        color: getNodeColor(node),
        radius: node.radius || (index === 0 ? 30 : 24)
      }));
    }

    function updateGraph(data) {
      expandedNodes.clear();
      expandedClusters.clear();
      selectedNodeId = null;
      focusNodeId = null;
      currentGraphData = {
        nodes: enrichNodes(data.nodes || []),
        edges: (data.edges || []).map((edge) => ({ ...edge }))
      };
      render();
    }

    function setLayout(mode) {
      layoutMode = mode || "horizontal";
      render();
    }

    function focusNode(nodeId) {
      focusNodeId = nodeId;
      selectedNodeId = nodeId;
      render();
    }

    function getNodeRadius(node, index) {
      if (node.radius) {
        return node.radius;
      }

      if (node.type === "subsystem") {
        return 30;
      }

      if (node.type === "module") {
        return 24;
      }

      if (node.type === "cluster") {
        return 28;
      }

      return 18;
    }

    function getChildrenByParent(nodes) {
      const childrenByParent = new Map();

      for (const node of nodes) {
        if (!node.parent) {
          continue;
        }

        if (!childrenByParent.has(node.parent)) {
          childrenByParent.set(node.parent, []);
        }

        childrenByParent.get(node.parent).push(node);
      }

      return childrenByParent;
    }

    function getVisibleGraphData() {
      const allNodes = currentGraphData.nodes.map((node, index) => ({
        ...node,
        radius: getNodeRadius(node, index)
      }));
      const childrenByParent = getChildrenByParent(allNodes);
      const nodeIds = new Set(allNodes.map((node) => node.id));
      const visibleNodes = allNodes.filter((node) => {
        if (node.type === "subsystem") {
          return true;
        }

        if ((node.type === "module") && node.parent) {
          if (!nodeIds.has(node.parent)) {
            return true;
          }
          return expandedNodes.has(node.parent);
        }

        if ((node.type === "class" || node.type === "function") && node.parent) {
          return expandedNodes.has(node.parent);
        }

        return false;
      }).map((node) => ({
        ...node,
        hasChildren: childrenByParent.has(node.id),
        isExpanded: expandedNodes.has(node.id)
      }));

      const visibleNodeIds = new Set(visibleNodes.map((node) => node.id));
      const visibleEdges = currentGraphData.edges
        .filter((edge) => visibleNodeIds.has(edge.source) && visibleNodeIds.has(edge.target))
        .map((edge) => ({ ...edge }));

      return { nodes: visibleNodes, edges: visibleEdges };
    }

    function buildClusteredGraphData(nodes, edges) {
      const nodesById = new Map(nodes.map((node) => [node.id, node]));
      const childrenByParent = getChildrenByParent(nodes);
      const clusterMap = new Map();
      const clusteredNodes = [];

      for (const node of nodes) {
        const childNodes = childrenByParent.get(node.id) || [];
        const clusterableChildren = childNodes.filter((child) =>
          child.type === "module" || child.type === "class" || child.type === "function"
        );

        if (clusterableChildren.length > 3) {
          const clusterId = `${node.id}::cluster`;
          const clusterExpanded = expandedClusters.has(clusterId);

          clusterMap.set(node.id, {
            id: clusterId,
            expanded: clusterExpanded,
            childIds: new Set(clusterableChildren.map((child) => child.id)),
          });

          const remainingChildren = childNodes.filter((child) => !clusterMap.get(node.id).childIds.has(child.id));
          node.hasChildren = true;
          clusteredNodes.push(node);
          clusteredNodes.push(
            {
              id: clusterId,
              name: `functions (${clusterableChildren.length})`,
              label: `functions (${clusterableChildren.length})`,
              type: "cluster",
              parent: node.id,
              count: clusterableChildren.length,
              color: "#3c2a5e",
              radius: 28,
              hasChildren: true,
              isExpanded: clusterExpanded,
              markers: [],
            }
          );
          if (clusterExpanded) {
            clusteredNodes.push(...clusterableChildren);
          }
          clusteredNodes.push(...remainingChildren);
          continue;
        }

        clusteredNodes.push(node);
      }

      const clusteredNodeIds = new Set(clusteredNodes.map((node) => node.id));
      const clusteredEdges = [];
      const edgeIndex = new Set();

      for (const edge of edges) {
        let sourceId = getEdgeEndpointId(edge.source);
        let targetId = getEdgeEndpointId(edge.target);

        for (const [parentId, clusterInfo] of clusterMap.entries()) {
          if (!clusterInfo.expanded && clusterInfo.childIds.has(sourceId)) {
            sourceId = clusterInfo.id;
          }
          if (!clusterInfo.expanded && clusterInfo.childIds.has(targetId)) {
            targetId = clusterInfo.id;
          }
        }

        if (!clusteredNodeIds.has(sourceId) || !clusteredNodeIds.has(targetId) || sourceId === targetId) {
          continue;
        }

        const edgeKey = `${sourceId}:${targetId}:${edge.type}`;
        if (edgeIndex.has(edgeKey)) {
          continue;
        }

        edgeIndex.add(edgeKey);
        clusteredEdges.push({
          ...edge,
          source: sourceId,
          target: targetId,
        });
      }

      return { nodes: clusteredNodes, edges: clusteredEdges };
    }

    function getFocusNodes(nodeId, radius, edges) {
      if (!nodeId) {
        return new Set();
      }

      const visited = new Set([nodeId]);
      let frontier = new Set([nodeId]);

      for (let depth = 0; depth < radius; depth += 1) {
        const nextFrontier = new Set();

        for (const edge of edges) {
          const sourceId = getEdgeEndpointId(edge.source);
          const targetId = getEdgeEndpointId(edge.target);

          if (frontier.has(sourceId) && !visited.has(targetId)) {
            visited.add(targetId);
            nextFrontier.add(targetId);
          }

          if (frontier.has(targetId) && !visited.has(sourceId)) {
            visited.add(sourceId);
            nextFrontier.add(sourceId);
          }
        }

        frontier = nextFrontier;
        if (!frontier.size) {
          break;
        }
      }

      return visited;
    }

    function getEdgeEndpointId(endpoint) {
      if (typeof endpoint === "object" && endpoint !== null) {
        return endpoint.id;
      }

      return endpoint;
    }

    function layoutHorizontal(nodes, canvasWidth, canvasHeight) {
      const spacing = 220;
      const startX = 140;
      const centerY = canvasHeight / 2;

      nodes.forEach((node, index) => {
        node.x = startX + (index * spacing);
        node.y = centerY;
      });
    }

    function layoutVertical(nodes, canvasWidth, canvasHeight) {
      const spacing = 160;
      const centerX = canvasWidth / 2;
      const startY = 120;

      nodes.forEach((node, index) => {
        node.x = centerX;
        node.y = startY + (index * spacing);
      });
    }

    function layoutRadial(nodes, canvasWidth, canvasHeight) {
      const centerX = canvasWidth / 2;
      const centerY = canvasHeight / 2;
      const radius = Math.min(canvasWidth, canvasHeight) * 0.3;

      if (!nodes.length) {
        return;
      }

      nodes[0].x = centerX;
      nodes[0].y = centerY;

      const orbitNodes = nodes.slice(1);
      orbitNodes.forEach((node, index) => {
        const angle = (index / Math.max(orbitNodes.length, 1)) * Math.PI * 2;
        node.x = centerX + (radius * Math.cos(angle));
        node.y = centerY + (radius * Math.sin(angle));
      });
    }

    function layoutGrid(nodes, canvasWidth, canvasHeight) {
      const columns = 4;
      const horizontalSpacing = 200;
      const verticalSpacing = 160;
      const startX = 140;
      const startY = 120;

      nodes.forEach((node, index) => {
        const column = index % columns;
        const row = Math.floor(index / columns);
        node.x = startX + (column * horizontalSpacing);
        node.y = startY + (row * verticalSpacing);
      });
    }

    function applyLayout(mode, nodes, canvasWidth, canvasHeight) {
      if (mode === "vertical") {
        layoutVertical(nodes, canvasWidth, canvasHeight);
        return;
      }

      if (mode === "radial") {
        layoutRadial(nodes, canvasWidth, canvasHeight);
        return;
      }

      if (mode === "grid") {
        layoutGrid(nodes, canvasWidth, canvasHeight);
        return;
      }

      layoutHorizontal(nodes, canvasWidth, canvasHeight);
    }

    function render() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      const { nodes: rawNodes, edges: rawEdges } = getVisibleGraphData();
      const { nodes: baseNodes, edges: baseEdges } = buildClusteredGraphData(rawNodes, rawEdges);
      const focusNodes = focusNodeId ? getFocusNodes(focusNodeId, focusRadius, baseEdges) : null;
      const nodes = (focusNodeId && !focusFadeMode)
        ? baseNodes.filter((node) => focusNodes && focusNodes.has(node.id))
        : baseNodes.map((node) => ({
            ...node,
            inFocus: !focusNodes || focusNodes.has(node.id)
          }));
      const edges = baseEdges.filter((edge) => {
        if (!focusNodes) {
          return true;
        }

        const sourceId = getEdgeEndpointId(edge.source);
        const targetId = getEdgeEndpointId(edge.target);
        return focusNodes.has(sourceId) && focusNodes.has(targetId);
      });
      const connectedNodeIds = new Set();

      if (selectedNodeId !== null) {
        for (const edge of edges) {
          const sourceId = getEdgeEndpointId(edge.source);
          const targetId = getEdgeEndpointId(edge.target);
          if (sourceId === selectedNodeId || targetId === selectedNodeId) {
            connectedNodeIds.add(sourceId);
            connectedNodeIds.add(targetId);
          }
        }
      }

      svg.selectAll("*").remove();
      svg.attr("viewBox", `0 0 ${width} ${height}`);
      svg.on("click", (event) => {
        if (event.target === svg.node()) {
          focusNodeId = null;
          selectedNodeId = null;
          render();
        }
      });

      if (!nodes.length) {
        svg.append("text")
          .attr("x", width / 2)
          .attr("y", height / 2)
          .attr("text-anchor", "middle")
          .attr("fill", "#49617f")
          .style("font-size", "14px")
          .text("Waiting for graph data...");
        return;
      }

      const root = svg.append("g");

      if (!zoomBehavior) {
        zoomBehavior = d3.zoom()
          .scaleExtent([0.5, 2.5])
          .on("zoom", (event) => {
            currentTransform = event.transform;
            root.attr("transform", currentTransform);
          });
      } else {
        zoomBehavior.on("zoom", (event) => {
          currentTransform = event.transform;
          root.attr("transform", currentTransform);
        });
      }

      svg.call(zoomBehavior);
      const layoutNodes = [...nodes];
      if (focusNodeId) {
        layoutNodes.sort((left, right) => {
          if (left.id === focusNodeId) {
            return -1;
          }
          if (right.id === focusNodeId) {
            return 1;
          }
          return 0;
        });
      }
      applyLayout(focusNodeId ? "radial" : layoutMode, layoutNodes, width, height);
      const nodeById = new Map(layoutNodes.map((node) => [node.id, node]));
      const positionedEdges = edges.map((edge) => ({
        ...edge,
        sourceNode: nodeById.get(getEdgeEndpointId(edge.source)),
        targetNode: nodeById.get(getEdgeEndpointId(edge.target))
      }));

      const link = root.append("g")
        .selectAll("line")
        .data(positionedEdges.filter((edge) => edge.sourceNode && edge.targetNode))
        .enter()
        .append("line")
        .attr("class", "link")
        .attr("stroke", (d) => {
          const sourceId = getEdgeEndpointId(d.source);
          const targetId = getEdgeEndpointId(d.target);
          if (selectedNodeId === null) {
            return "#2a2a33";
          }
          if (sourceId === selectedNodeId || targetId === selectedNodeId) {
            return "#b56cff";
          }
          return "#2a2a33";
        })
        .attr("stroke-width", (d) => {
          const sourceId = getEdgeEndpointId(d.source);
          const targetId = getEdgeEndpointId(d.target);
          if (selectedNodeId !== null && (sourceId === selectedNodeId || targetId === selectedNodeId)) {
            return 4;
          }
          return 2;
        })
        .attr("opacity", (d) => {
          const sourceId = getEdgeEndpointId(d.source);
          const targetId = getEdgeEndpointId(d.target);
          if (focusNodes && (!focusNodes.has(sourceId) || !focusNodes.has(targetId))) {
            return focusFadeMode ? 0.08 : 0;
          }
          if (selectedNodeId === null) {
            return 1;
          }
          if (sourceId === selectedNodeId || targetId === selectedNodeId) {
            return 1;
          }
          return 0.2;
        });

      const node = root.append("g")
        .selectAll("g")
        .data(nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .classed("node--expanded", (d) => d.isExpanded)
        .classed("node--selected", (d) => d.id === selectedNodeId)
        .attr("opacity", (d) => {
          if (focusNodes && !d.inFocus) {
            return focusFadeMode ? 0.15 : 0;
          }
          if (selectedNodeId === null) {
            return 1;
          }
          if (d.id === selectedNodeId || connectedNodeIds.has(d.id)) {
            return 1;
          }
          return 0.25;
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          selectedNodeId = d.id;
          if (event.shiftKey) {
            if (d.type !== "cluster" && window.graphBridge && typeof window.graphBridge.nodeSelected === "function") {
              window.graphBridge.nodeSelected(d.id);
            }
            render();
            return;
          }

          if (d.type !== "cluster" && window.graphBridge && typeof window.graphBridge.nodeSelected === "function") {
            window.graphBridge.nodeSelected(d.id);
          }

          if (d.type === "cluster") {
            if (expandedClusters.has(d.id)) {
              expandedClusters.delete(d.id);
            } else {
              expandedClusters.add(d.id);
            }
            render();
            return;
          }

          if (!d.hasChildren) {
            render();
            return;
          }

          if (expandedNodes.has(d.id)) {
            expandedNodes.delete(d.id);
          } else {
            expandedNodes.add(d.id);
          }

          render();
        })
        .on("dblclick", (event, d) => {
          event.stopPropagation();
          selectedNodeId = d.id;
          focusNodeId = d.id;
          if (window.graphBridge && typeof window.graphBridge.focusNode === "function") {
            window.graphBridge.focusNode(d.id);
          } else {
            render();
          }
        });

      node.append("circle")
        .attr("r", (d) => d.radius)
        .attr("fill", (d) => d.color)
        .attr("stroke", (d) => d.type === "cluster" ? "#b56cff" : "rgba(255, 255, 255, 0.95)")
        .attr("stroke-width", (d) => d.type === "cluster" ? 4 : 3);

      node.filter((d) => Array.isArray(d.markers) && d.markers.length > 0)
        .append("circle")
        .attr("class", "marker-badge")
        .attr("r", 6)
        .attr("cx", (d) => d.radius - 4)
        .attr("cy", (d) => -d.radius + 4)
        .attr("fill", (d) => getMarkerColor(d.markers[0]));

      node.append("text")
        .attr("text-anchor", "middle")
        .attr("dy", 4)
        .text((d) => d.label);

      link
        .attr("x1", (d) => d.sourceNode.x)
        .attr("y1", (d) => d.sourceNode.y)
        .attr("x2", (d) => d.targetNode.x)
        .attr("y2", (d) => d.targetNode.y);

      node.attr("transform", (d) => `translate(${d.x},${d.y})`);
      root.attr("transform", currentTransform);
      svg.call(zoomBehavior.transform, currentTransform);
    }

    function initializeBridge() {
      if (!window.qt || !window.qt.webChannelTransport) {
        render();
        return;
      }

      new QWebChannel(window.qt.webChannelTransport, function(channel) {
        window.graphBridge = channel.objects.graphBridge;
        window.graphBridge.sendGraph(function(data) {
          updateGraph(data);
        });
      });
    }

    render();
    initializeBridge();
    window.addEventListener("resize", () => render());
  </script>
</body>
</html>
