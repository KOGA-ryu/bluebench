<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(╯°□°)╯︵ ┻━┻ Blue Bench Explorer</title>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="./d3.v7.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --canvas: #0c0a12;
      --panel: #140f1d;
      --panel-alt: #100c18;
      --border: rgba(242, 233, 221, 0.14);
      --text: #f4efe6;
      --muted: #baae9d;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      --header-h: 28px;
      --node-w: 236px;
      --node-h: 210px;
      --pad: 12px;
      --button: #22182f;
      --button-border: rgba(255, 255, 255, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(138, 96, 53, 0.22), transparent 24%),
        radial-gradient(circle at bottom right, rgba(29, 67, 107, 0.28), transparent 28%),
        var(--canvas);
      color: var(--text);
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .shell {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7e7265;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .viewport {
      position: absolute;
      inset: 0;
      display: flex;
      overflow: hidden;
    }

    .frozen-pane {
      position: relative;
      display: flex;
      flex-direction: column;
      width: calc(var(--node-w) + 24px);
      min-width: calc(var(--node-w) + 24px);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      background:
        linear-gradient(180deg, rgba(17, 12, 25, 0.98), rgba(9, 7, 14, 0.98));
      overflow: hidden;
      z-index: 2;
    }

    .scroll-pane {
      position: relative;
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: auto;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 0, rgba(255, 255, 255, 0.015) 132px, rgba(10, 8, 16, 0) 132px, rgba(10, 8, 16, 0) 264px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 0, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        transparent;
      background-size: 264px 100%;
    }

    .frozen-content,
    .scroll-content {
      position: relative;
      flex: 1 1 auto;
      min-height: 100%;
    }

    .status {
      position: absolute;
      right: 16px;
      bottom: 12px;
      z-index: 4;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: rgba(10, 8, 16, 0.88);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .node {
      position: absolute;
      width: var(--node-w);
      height: var(--node-h);
      border: 1px solid var(--border);
      border-radius: 0;
      background: linear-gradient(180deg, rgba(22, 17, 31, 0.96), rgba(14, 11, 21, 0.96));
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 5;
      pointer-events: auto;
    }

    .node.is-header-only .metadata-panel,
    .node.is-header-only .load-more {
      display: none;
    }

    .node-header {
      position: relative;
      display: grid;
      grid-template-columns: 28px 1fr 28px;
      align-items: center;
      gap: 8px;
      height: var(--header-h);
      padding: 0 6px;
      background: rgba(6, 5, 10, 0.52);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      pointer-events: auto;
    }

    .header-strip {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .node-button {
      width: 24px;
      height: 24px;
      padding: 0;
      border: 1px solid var(--button-border);
      background: var(--button);
      color: #f5e9d4;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      position: relative;
      z-index: 8;
      pointer-events: auto;
    }

    .node-button:disabled {
      opacity: 0.32;
      cursor: default;
    }

    .node-title {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: default;
    }

    .node-title.is-openable {
      cursor: pointer;
    }

    .node-body {
      height: calc(var(--node-h) - var(--header-h));
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: linear-gradient(180deg, rgba(12, 10, 18, 0.9), rgba(17, 13, 25, 0.98));
      position: relative;
    }

    .indicator-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 22px;
    }

    .indicator-cluster {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tier-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 8px;
    }

    .compute-chip {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 2px 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .compute-chip.is-primary {
      color: #f3e7d3;
      border-color: rgba(214, 182, 121, 0.22);
      background: rgba(214, 182, 121, 0.08);
      font-weight: 700;
    }

    .compute-chip.is-delta-pos {
      color: #d9f0ba;
      border-color: rgba(133, 179, 84, 0.24);
      background: rgba(117, 139, 84, 0.12);
    }

    .compute-chip.is-delta-neg {
      color: #f0c3b8;
      border-color: rgba(168, 86, 67, 0.24);
      background: rgba(154, 78, 63, 0.12);
    }

    .body-summary {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      font-size: 11px;
      color: #e7dccf;
      line-height: 1.35;
    }

    .body-summary-main {
      min-width: 0;
    }

    .body-summary-title {
      color: #f3e7d3;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .body-summary-subtitle {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .body-summary-meta {
      color: #cdbfae;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .body-summary-external {
      color: #d9c18b;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    .body-summary-path {
      color: #9e9588;
      font-size: 10px;
      text-align: right;
      max-width: 84px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    .metadata-panel {
      flex: 1;
      min-height: 0;
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 8px;
      background: rgba(7, 6, 12, 0.6);
      font-size: 11px;
      line-height: 1.45;
      color: #e7dccf;
    }

    .metadata-panel::-webkit-scrollbar,
    .scroll-pane::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .metadata-panel::-webkit-scrollbar-thumb,
    .scroll-pane::-webkit-scrollbar-thumb {
      background: rgba(214, 182, 121, 0.2);
    }

    .load-more {
      border: 1px solid var(--button-border);
      background: rgba(34, 24, 47, 0.8);
      color: var(--text);
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 8px;
      cursor: pointer;
    }

    .metadata-toggle {
      position: absolute;
      right: 8px;
      bottom: 8px;
    }

    .tooltip {
      position: fixed;
      z-index: 10;
      display: none;
      max-width: 280px;
      padding: 6px 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 7, 11, 0.96);
      color: #f8eedf;
      font-size: 11px;
      pointer-events: none;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="viewport" id="viewport" hidden>
      <div class="frozen-pane">
        <div class="frozen-content" id="frozenContent"></div>
      </div>
      <div class="scroll-pane" id="scrollPane">
        <div class="scroll-content" id="scrollContent"></div>
      </div>
    </div>
    <div class="empty" id="emptyState" hidden></div>
    <div class="status" id="statusLabel" hidden></div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
